name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  # Cheap gate. Runs first so a formatting slip fails in ~20s rather than
  # after a full dependency install.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/ --select=E,F,W,I --ignore=E501

      - name: Ruff format check
        run: ruff format backend/ --check

  # ── Tests ───────────────────────────────────────────────────────────────
  # One job, one dependency install, one pytest invocation over the whole
  # suite. This previously ran as two jobs — `tests/` minus `test_api.py`,
  # then `test_api.py` alone — which installed identical dependencies twice
  # and split a suite that has no reason to be split. A third job existed
  # solely to echo a paragraph of text, consuming a runner to print a message.
  #
  # There is no Ollama or ChromaDB in CI; `tests/` is self-contained and mocks
  # both.
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      ADMIN_PASSWORD: ci-test-password
      CORS_ORIGINS: "*"
      PYTHONPATH: backend
      # Keep CI off any model download path. The suite never constructs the
      # reranker; if that changes, this makes the network call fail loudly
      # instead of hanging until the job times out.
      HF_HUB_OFFLINE: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run test suite
        working-directory: backend
        run: |
          pytest tests/ \
            -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

      # Retrieval quality is not a unit test: it needs a running Ollama
      # instance and a populated index. Recorded in the run summary so the
      # omission is deliberate and visible rather than a gap to rediscover.
      - name: Note evaluation coverage
        if: always()
        run: |
          {
            echo "### Not covered by CI"
            echo ""
            echo "Retrieval quality requires Ollama and a populated ChromaDB index."
            echo "Run locally against a real corpus:"
            echo ""
            echo '```bash'
            echo "make seed        # build the corpus"
            echo "make eval-set    # build the labelled query set"
            echo "make eval-fast   # retrieval metrics -> MLflow"
            echo "make ablate      # stage-wise ablation"
            echo '```'
            echo ""
            echo "Method and results: docs/retrieval-experiments.md"
          } >> "$GITHUB_STEP_SUMMARY"
